<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BiblioTech — Emprunts</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css">
  <style>
    .toolbar { display:flex; align-items:center; gap:12px; margin-bottom:22px; flex-wrap:wrap; }
    .search-wrap { flex:1; min-width:200px; position:relative; }
    .search-wrap input { width:100%; background:var(--s1); border:1px solid var(--border); border-radius:9px; padding:9px 14px 9px 38px; color:var(--text); font-family:'Instrument Sans',sans-serif; font-size:.85rem; outline:none; transition:border-color .2s; }
    .search-wrap input:focus { border-color:var(--accent); }
    .search-wrap input::placeholder { color:var(--dim); }
    .search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:.85rem; pointer-events:none; }
    .filter-tabs { display:flex; gap:4px; background:var(--s1); border:1px solid var(--border); border-radius:9px; padding:4px; }
    .filter-tab { padding:6px 14px; border-radius:6px; border:none; background:none; font-family:'Instrument Sans',sans-serif; font-size:.78rem; font-weight:600; color:var(--dim); transition:all .18s; }
    .filter-tab.active { background:var(--accent); color:#fff; }

    .borrow-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px; }

    .table-wrap { background:var(--s1); border:1px solid var(--border); border-radius:12px; overflow:hidden; animation:fadeUp .3s ease; }
    table { width:100%; border-collapse:collapse; }
    thead { background:var(--s2); }
    th { padding:12px 18px; text-align:left; font-size:.68rem; color:var(--dim); text-transform:uppercase; letter-spacing:1.5px; font-weight:600; border-bottom:1px solid var(--border); }
    td { padding:13px 18px; font-size:.84rem; color:var(--text); border-bottom:1px solid var(--border); vertical-align:middle; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:var(--s2); }

    .book-cell h4 { font-size:.88rem; font-weight:600; }
    .book-cell p  { font-size:.72rem; color:var(--dim); margin-top:2px; }
    .member-cell { display:flex; align-items:center; gap:10px; }
    .member-dot { width:30px; height:30px; border-radius:50%; display:grid; place-items:center; font-size:.7rem; font-weight:700; color:#fff; flex-shrink:0; }
    .member-cell-name { font-size:.84rem; font-weight:500; }
    .member-cell-role { font-size:.7rem; color:var(--dim); }
    .date-cell { font-family:'JetBrains Mono',monospace; font-size:.75rem; color:var(--dim); }
    .days-ok   { color:var(--green); font-family:'JetBrains Mono',monospace; font-size:.8rem; }
    .days-warn { color:var(--amber); font-family:'JetBrains Mono',monospace; font-size:.8rem; }
    .days-late { color:var(--red);   font-family:'JetBrains Mono',monospace; font-size:.8rem; }
    .td-actions { display:flex; gap:6px; justify-content:flex-end; }

    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); backdrop-filter:blur(6px); z-index:500; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .25s; }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal { background:var(--s2); border:1px solid var(--border); border-radius:16px; padding:28px; width:460px; max-width:95vw; transform:scale(.95) translateY(10px); transition:transform .25s; }
    .modal-overlay.open .modal { transform:scale(1) translateY(0); }
    .modal-title { font-family:'Fraunces',serif; font-size:1.2rem; font-weight:700; margin-bottom:20px; display:flex; align-items:center; justify-content:space-between; }
    .modal-close { background:none; border:none; color:var(--dim); font-size:1.2rem; }
    .fg { margin-bottom:14px; }
    .fg label { display:block; font-size:.68rem; color:var(--dim); text-transform:uppercase; letter-spacing:1.5px; font-weight:600; margin-bottom:6px; }
    .fg input, .fg select { width:100%; background:var(--s3); border:1px solid var(--border); border-radius:8px; padding:10px 12px; color:var(--text); font-family:'Instrument Sans',sans-serif; font-size:.85rem; outline:none; transition:border-color .2s; }
    .fg input:focus, .fg select:focus { border-color:var(--accent); }
    .fg select option { background:var(--s2); }
    .modal-actions { display:flex; gap:10px; margin-top:20px; justify-content:flex-end; }

    .return-summary { background:var(--s3); border-radius:10px; padding:14px 16px; margin-bottom:16px; }
    .return-summary h4 { font-size:.95rem; font-weight:600; margin-bottom:4px; }
    .return-summary p  { font-size:.78rem; color:var(--dim); }

    .toasts { position:fixed; bottom:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
    .toast { background:var(--s2); border:1px solid var(--border); border-radius:10px; padding:12px 16px; font-size:.82rem; color:var(--text); animation:toastIn .25s ease; min-width:230px; }
    .toast.ok  { border-color:rgba(52,211,153,.4); }
    .toast.err { border-color:rgba(248,113,113,.4); }
    @keyframes toastIn { from { transform:translateX(20px); opacity:0; } to { transform:none; opacity:1; } }

    .empty-state { text-align:center; padding:60px 20px; color:var(--dim); }
    .empty-state .ei { font-size:3rem; margin-bottom:12px; opacity:.3; }
    .loading-row td { text-align:center; padding:40px; color:var(--dim); }
  </style>
</head>
<body style="visibility:hidden">

<div class="cursor" id="cursor"></div>
<div class="toasts" id="toasts"></div>

<aside class="sidebar">
  <a href="index.html" class="sb-logo"><div class="sb-logo-icon">📚</div><div class="sb-logo-name">BiblioTech</div></a>
  <div class="sb-role-badge" id="role-badge">...</div>
  <nav class="sb-nav" id="sidebar-nav"></nav>
  <div class="sb-footer">
    <div class="sb-user">
      <div class="sb-avatar" id="user-avatar">--</div>
      <div><div class="sb-user-name" id="user-name">Chargement...</div><div class="sb-user-role" id="user-email">—</div></div>
    </div>
    <button class="sb-logout" onclick="handleLogout()">🚪 Déconnexion</button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="page-title">Emprunts</div>
    <div class="topbar-right">
      <span class="topbar-date" id="today-date"></span>
      <button class="btn btn-primary" id="btn-new" onclick="openModal()" style="display:none">➕ Nouvel emprunt</button>
    </div>
  </div>
  <div class="content">
    <div class="borrow-stats" id="borrow-stats"></div>
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Rechercher par livre ou membre...">
      </div>
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('all',this)">Tous</button>
        <button class="filter-tab" onclick="setFilter('active',this)">Actifs</button>
        <button class="filter-tab" onclick="setFilter('returned',this)">Retournés</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Livre</th><th>Membre</th><th>Date emprunt</th><th>Durée</th><th>Statut</th><th style="text-align:right">Actions</th>
        </tr></thead>
        <tbody id="borrowings-tbody"><tr class="loading-row"><td colspan="6">⏳ Chargement...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL NOUVEL EMPRUNT -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title"><span>Nouvel emprunt</span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="fg"><label>Livre</label><select id="input-book"><option value="">-- Choisir un livre disponible --</option></select></div>
    <div class="fg"><label>Membre</label><select id="input-member"><option value="">-- Choisir un membre --</option></select></div>
    <div class="fg"><label>Date d'emprunt</label><input type="date" id="input-date"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" id="btn-save" onclick="saveBorrowing()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL RETOUR -->
<div class="modal-overlay" id="modal-return" onclick="if(event.target===this)closeReturnModal()">
  <div class="modal" style="width:380px">
    <div class="modal-title"><span>Confirmer le retour</span><button class="modal-close" onclick="closeReturnModal()">✕</button></div>
    <div class="return-summary" id="return-summary"></div>
    <p style="color:var(--dim);font-size:.82rem;margin-bottom:4px">Le livre sera remis disponible et l'emprunt clôturé.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeReturnModal()">Annuler</button>
      <button class="btn btn-primary" id="btn-confirm-return" style="background:var(--green)" onclick="confirmReturn()">✅ Confirmer</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="db.js"></script>
<script>
  const AVATAR_COLORS = ['#c84b2f','#60a5fa','#34d399','#fbbf24','#a78bfa','#f87171']
  let allBorrowings=[], currentRole=null, currentMember=null
  let currentFilter='all', searchQuery='', returningId=null

  async function init() {
    const auth = await requireAuth(['admin','teacher','student'])
    if (!auth) return
    currentRole   = auth.member.role
    currentMember = auth.member
    fillUserUI(auth.member)
    buildSidebar(currentRole)

    if (currentRole === 'admin') {
      document.getElementById('btn-new').style.display = 'flex'
      document.getElementById('page-title').textContent = 'Gestion des emprunts'
    } else {
      document.getElementById('page-title').textContent = 'Mes emprunts'
    }

    await loadBorrowings()
    document.body.style.visibility = 'visible'
  }

  function buildSidebar(role) {
    const badge = document.getElementById('role-badge')
    const nav   = document.getElementById('sidebar-nav')
    const dash  = role==='admin'?'dashboard-admin.html':role==='teacher'?'dashboard-teacher.html':'dashboard-student.html'
    if (role==='admin') {
      badge.className='sb-role-badge role-admin'; badge.textContent='⚙️ Administrateur'
      nav.innerHTML=`<div class="sb-section">Principal</div>
        <a href="${dash}" class="sb-link"><span class="si">🏠</span> Tableau de bord</a>
        <a href="books.html" class="sb-link"><span class="si">📖</span> Livres</a>
        <a href="members.html" class="sb-link"><span class="si">👥</span> Membres</a>
        <a href="borrowings.html" class="sb-link active"><span class="si">🔄</span> Emprunts</a>
        <div class="sb-section">Catalogue</div>
        <a href="authors.html" class="sb-link"><span class="si">✍️</span> Auteurs</a>`
    } else if (role==='teacher') {
      badge.className='sb-role-badge role-teacher'; badge.textContent='🏫 Enseignant'
      document.getElementById('user-avatar').style.background='var(--green)'
      nav.innerHTML=`<div class="sb-section">Mon espace</div>
        <a href="${dash}" class="sb-link"><span class="si">🏠</span> Tableau de bord</a>
        <a href="borrowings.html" class="sb-link active"><span class="si">🔄</span> Mes emprunts</a>
        <a href="books.html" class="sb-link"><span class="si">📖</span> Livres</a>`
    } else {
      badge.className='sb-role-badge role-student'; badge.textContent='🎓 Étudiant'
      document.getElementById('user-avatar').style.background='var(--blue)'
      nav.innerHTML=`<div class="sb-section">Mon espace</div>
        <a href="${dash}" class="sb-link"><span class="si">🏠</span> Tableau de bord</a>
        <a href="borrowings.html" class="sb-link active"><span class="si">🔄</span> Mes emprunts</a>
        <a href="books.html" class="sb-link"><span class="si">📖</span> Livres</a>`
    }
  }

  async function loadBorrowings() {
    document.getElementById('borrowings-tbody').innerHTML = '<tr class="loading-row"><td colspan="6">⏳ Chargement...</td></tr>'
    if (currentRole === 'admin') {
      allBorrowings = await getBorrowings()
    } else {
      allBorrowings = await getMyBorrowings(currentMember.id)
    }
    updateStats()
    renderBorrowings()
  }

  function updateStats() {
    const active   = allBorrowings.filter(b => b.status === 'active')
    const returned = allBorrowings.filter(b => b.status === 'returned')
    const max      = currentRole === 'teacher' ? 10 : 3

    let html = ''
    if (currentRole === 'admin') {
      html = `
        <div class="stat-card sc-amber"><div class="sc-top"><span class="sc-label">Actifs</span><span class="sc-icon">🔄</span></div><div class="sc-val">${active.length}</div><div class="sc-sub">en circulation</div></div>
        <div class="stat-card sc-green"><div class="sc-top"><span class="sc-label">Retournés</span><span class="sc-icon">✅</span></div><div class="sc-val">${returned.length}</div><div class="sc-sub">au total</div></div>
        <div class="stat-card sc-blue"><div class="sc-top"><span class="sc-label">Total</span><span class="sc-icon">📊</span></div><div class="sc-val">${allBorrowings.length}</div><div class="sc-sub">tous emprunts</div></div>
        <div class="stat-card sc-accent"><div class="sc-top"><span class="sc-label">Membres actifs</span><span class="sc-icon">👥</span></div><div class="sc-val">${[...new Set(active.map(b=>b.member_id))].length}</div><div class="sc-sub">ont emprunté</div></div>`
    } else {
      html = `
        <div class="stat-card sc-blue"><div class="sc-top"><span class="sc-label">Mes emprunts</span><span class="sc-icon">📖</span></div><div class="sc-val">${active.length}</div><div class="sc-sub">en cours</div></div>
        <div class="stat-card sc-accent"><div class="sc-top"><span class="sc-label">Restants</span><span class="sc-icon">⚡</span></div><div class="sc-val">${max - active.length}</div><div class="sc-sub">possibles</div></div>
        <div class="stat-card sc-green"><div class="sc-top"><span class="sc-label">Retournés</span><span class="sc-icon">✅</span></div><div class="sc-val">${returned.length}</div><div class="sc-sub">au total</div></div>
        <div class="stat-card sc-amber"><div class="sc-top"><span class="sc-label">Limite</span><span class="sc-icon">🔒</span></div><div class="sc-val">${max}</div><div class="sc-sub">max autorisés</div></div>`
    }
    document.getElementById('borrow-stats').innerHTML = html
  }

  function renderBorrowings() {
    const tbody = document.getElementById('borrowings-tbody')
    let filtered = allBorrowings
    if (currentFilter === 'active')   filtered = filtered.filter(b => b.status === 'active')
    if (currentFilter === 'returned') filtered = filtered.filter(b => b.status === 'returned')
    if (searchQuery.trim()) {
      const q = searchQuery.toLowerCase()
      filtered = filtered.filter(b => {
        const title  = (currentRole==='admin' ? b.books?.title : b.books?.title) || ''
        const member = currentRole==='admin' ? `${b.members?.first_name} ${b.members?.last_name}` : ''
        return title.toLowerCase().includes(q) || member.toLowerCase().includes(q)
      })
    }
    if (filtered.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="ei">🔄</div><p>Aucun emprunt trouvé</p></div></td></tr>`
      return
    }
    const today = new Date()
    tbody.innerHTML = filtered.map((b, i) => {
      const book       = b.books || {}
      const member     = b.members || { first_name: currentMember.first_name, last_name: currentMember.last_name, role: currentRole }
      const fullName   = `${member.first_name||''} ${member.last_name||''}`.trim()
      const initials   = fullName.split(' ').filter(Boolean).map(n=>n[0]).join('').toUpperCase().slice(0,2)
      const avatarCol  = AVATAR_COLORS[i % AVATAR_COLORS.length]
      const diffDays   = Math.floor((today - new Date(b.borrow_date)) / 86400000)
      const daysClass  = diffDays > 30 ? 'days-late' : diffDays > 14 ? 'days-warn' : 'days-ok'
      const daysLabel  = b.status === 'returned' ? '<span style="color:var(--dim)">—</span>' : `<span class="${daysClass}">${diffDays}j</span>`
      const actions    = b.status === 'active'
        ? `<button class="btn btn-primary btn-sm" style="background:var(--green)" onclick="openReturnModal('${b.id}')">✅ Retourner</button>`
        : `<span style="font-size:.75rem;color:var(--dim)">Retourné le ${formatDate(b.return_date)}</span>`
      return `<tr>
        <td><div class="book-cell"><h4>${book.title||'—'}</h4><p>${book.author||'—'}</p></div></td>
        <td><div class="member-cell">
          <div class="member-dot" style="background:${avatarCol}">${initials||'?'}</div>
          <div><div class="member-cell-name">${fullName||member.email||'—'}</div>
          <div class="member-cell-role">${member.role==='student'?'🎓 Étudiant':member.role==='teacher'?'🏫 Enseignant':'⚙️ Admin'}</div></div>
        </div></td>
        <td class="date-cell">${formatDate(b.borrow_date)}</td>
        <td>${daysLabel}</td>
        <td><span class="badge ${b.status==='active'?'b-amber':'b-green'}">${b.status==='active'?'Actif':'Retourné'}</span></td>
        <td><div class="td-actions">${actions}</div></td>
      </tr>`
    }).join('')
  }

  function formatDate(d) {
    if (!d) return '—'
    return new Date(d).toLocaleDateString('fr-FR', { day:'numeric', month:'short', year:'numeric' })
  }

  function setFilter(f, btn) {
    currentFilter = f
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'))
    btn.classList.add('active')
    renderBorrowings()
  }
  document.getElementById('search-input').addEventListener('input', e => { searchQuery = e.target.value; renderBorrowings() })

  // ── MODAL NOUVEL EMPRUNT ──
  async function openModal() {
    const [books, members] = await Promise.all([getBooks(), getMembers()])
    const avail = books.filter(b => b.status === 'available')
    document.getElementById('input-book').innerHTML =
      '<option value="">-- Choisir un livre disponible --</option>' +
      avail.map(b => `<option value="${b.id}">${b.title} — ${b.author}</option>`).join('')
    document.getElementById('input-member').innerHTML =
      '<option value="">-- Choisir un membre --</option>' +
      members.map(m => {
        const max = m.role==='teacher'?10:3
        const dis = m.borrowed_count >= max ? 'disabled' : ''
        return `<option value="${m.id}" ${dis}>${m.first_name} ${m.last_name} (${m.borrowed_count}/${max})</option>`
      }).join('')
    document.getElementById('input-date').value = new Date().toISOString().split('T')[0]
    document.getElementById('modal-overlay').classList.add('open')
  }
  function closeModal() { document.getElementById('modal-overlay').classList.remove('open') }

  async function saveBorrowing() {
    const bookId   = document.getElementById('input-book').value
    const memberId = document.getElementById('input-member').value
    const date     = document.getElementById('input-date').value
    if (!bookId || !memberId || !date) { toast('❌ Tous les champs sont requis.','err'); return }
    const btn = document.getElementById('btn-save')
    btn.textContent = '⏳...'; btn.disabled = true
    try {
      await addBorrowing({ bookId, memberId, borrowDate: date })
      toast('📖 Emprunt enregistré !', 'ok')
      closeModal()
      await loadBorrowings()
    } catch(e) { toast('❌ ' + e.message, 'err') }
    finally { btn.textContent = 'Enregistrer'; btn.disabled = false }
  }

  // ── MODAL RETOUR ──
  function openReturnModal(id) {
    returningId = id
    const b = allBorrowings.find(b => b.id === id)
    const days = Math.floor((new Date() - new Date(b.borrow_date)) / 86400000)
    document.getElementById('return-summary').innerHTML = `
      <h4>📖 ${b.books?.title || '—'}</h4>
      <p>Emprunté il y a <strong>${days} jour${days>1?'s':''}</strong></p>`
    document.getElementById('modal-return').classList.add('open')
  }
  function closeReturnModal() { document.getElementById('modal-return').classList.remove('open'); returningId = null }

  async function confirmReturn() {
    const btn = document.getElementById('btn-confirm-return')
    btn.textContent = '⏳...'; btn.disabled = true
    try {
      await returnBorrowing(returningId)
      const b = allBorrowings.find(b => b.id === returningId)
      toast(`✅ "${b.books?.title}" retourné !`, 'ok')
      closeReturnModal()
      await loadBorrowings()
    } catch(e) { toast('❌ ' + e.message, 'err') }
    finally { btn.textContent = '✅ Confirmer'; btn.disabled = false }
  }

  const cursor = document.getElementById('cursor')
  document.addEventListener('mousemove', e => { cursor.style.left=e.clientX+'px'; cursor.style.top=e.clientY+'px' })
  document.addEventListener('mouseover', e => {
    if (e.target.matches('a,button,tr')) cursor.classList.add('big')
    else cursor.classList.remove('big')
  })

  init()
</script>
</body>
</html>
