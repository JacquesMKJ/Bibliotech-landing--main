<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BiblioTech — Emprunts</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css">
  <style>
    .toolbar {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 22px; flex-wrap: wrap;
    }
    .search-wrap { flex: 1; min-width: 200px; position: relative; }
    .search-wrap input {
      width: 100%; background: var(--s1); border: 1px solid var(--border);
      border-radius: 9px; padding: 9px 14px 9px 38px;
      color: var(--text); font-family: 'Instrument Sans', sans-serif;
      font-size: .85rem; outline: none; transition: border-color .2s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--dim); }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: .85rem; pointer-events: none; }

    .filter-tabs {
      display: flex; gap: 4px; background: var(--s1);
      border: 1px solid var(--border); border-radius: 9px; padding: 4px;
    }
    .filter-tab {
      padding: 6px 14px; border-radius: 6px; border: none; background: none;
      font-family: 'Instrument Sans', sans-serif; font-size: .78rem; font-weight: 600;
      color: var(--dim); transition: all .18s;
    }
    .filter-tab.active { background: var(--accent); color: #fff; }

    /* ── STATS ── */
    .borrow-stats {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 14px; margin-bottom: 22px;
    }

    /* ── TABLE ── */
    .table-wrap {
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      animation: fadeUp .3s ease;
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--s2); }
    th {
      padding: 12px 18px; text-align: left;
      font-size: .68rem; color: var(--dim);
      text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 13px 18px; font-size: .84rem; color: var(--text);
      border-bottom: 1px solid var(--border); vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--s2); }

    .book-cell h4 { font-size: .88rem; font-weight: 600; }
    .book-cell p  { font-size: .72rem; color: var(--dim); margin-top: 2px; }

    .member-cell { display: flex; align-items: center; gap: 10px; }
    .member-dot {
      width: 30px; height: 30px; border-radius: 50%;
      display: grid; place-items: center;
      font-size: .7rem; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .member-cell-name { font-size: .84rem; font-weight: 500; }
    .member-cell-role { font-size: .7rem; color: var(--dim); }

    .date-cell { font-family: 'JetBrains Mono', monospace; font-size: .75rem; color: var(--dim); }
    .days-cell { font-family: 'JetBrains Mono', monospace; font-size: .8rem; }
    .days-ok   { color: var(--green); }
    .days-warn { color: var(--amber); }
    .days-late { color: var(--red); }

    .td-actions { display: flex; gap: 6px; justify-content: flex-end; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.7);
      backdrop-filter: blur(6px); z-index: 500;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--s2); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px;
      width: 460px; max-width: 95vw;
      transform: scale(.95) translateY(10px); transition: transform .25s;
    }
    .modal-overlay.open .modal { transform: scale(1) translateY(0); }
    .modal-title {
      font-family: 'Fraunces', serif; font-size: 1.2rem; font-weight: 700;
      margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between;
    }
    .modal-close { background: none; border: none; color: var(--dim); font-size: 1.2rem; }
    .modal-close:hover { color: var(--text); }
    .fg { margin-bottom: 14px; }
    .fg label {
      display: block; font-size: .68rem; color: var(--dim);
      text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; margin-bottom: 6px;
    }
    .fg input, .fg select {
      width: 100%; background: var(--s3); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; color: var(--text);
      font-family: 'Instrument Sans', sans-serif; font-size: .85rem; outline: none;
      transition: border-color .2s;
    }
    .fg input:focus, .fg select:focus { border-color: var(--accent); }
    .fg select option { background: var(--s2); }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

    /* ── RETURN CONFIRM ── */
    .return-summary {
      background: var(--s3); border-radius: 10px; padding: 14px 16px;
      margin-bottom: 16px;
    }
    .return-summary h4 { font-size: .95rem; font-weight: 600; margin-bottom: 4px; }
    .return-summary p  { font-size: .78rem; color: var(--dim); }

    /* ── TOAST ── */
    .toasts { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      background: var(--s2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px;
      font-size: .82rem; color: var(--text);
      animation: toastIn .25s ease; min-width: 230px;
    }
    .toast.ok  { border-color: rgba(52,211,153,.4); }
    .toast.err { border-color: rgba(248,113,113,.4); }
    @keyframes toastIn { from { transform: translateX(20px); opacity:0; } to { transform: none; opacity:1; } }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--dim); }
    .empty-state .ei { font-size: 3rem; margin-bottom: 12px; opacity: .3; }
  </style>
</head>
<body style="visibility:hidden">

<div class="cursor" id="cursor"></div>
<div class="toasts" id="toasts"></div>

<!-- ════════ SIDEBAR ════════ -->
<aside class="sidebar" id="sidebar">
  <a href="index.html" class="sb-logo">
    <div class="sb-logo-icon">📚</div>
    <div class="sb-logo-name">BiblioTech</div>
  </a>
  <div class="sb-role-badge" id="role-badge">...</div>
  <nav class="sb-nav" id="sidebar-nav"></nav>
  <div class="sb-footer">
    <div class="sb-user">
      <div class="sb-avatar" id="user-avatar">--</div>
      <div>
        <div class="sb-user-name" id="user-name">Chargement...</div>
        <div class="sb-user-role" id="user-email">—</div>
      </div>
    </div>
    <button class="sb-logout" onclick="handleLogout()">🚪 Déconnexion</button>
  </div>
</aside>

<!-- ════════ MAIN ════════ -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="page-title">Emprunts</div>
    <div class="topbar-right">
      <span class="topbar-date" id="today-date"></span>
      <button class="btn btn-primary" id="btn-new" onclick="openModal()" style="display:none">
        ➕ Nouvel emprunt
      </button>
    </div>
  </div>

  <div class="content">

    <!-- STATS -->
    <div class="borrow-stats" id="borrow-stats"></div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Rechercher par livre ou membre...">
      </div>
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('all', this)">Tous</button>
        <button class="filter-tab" onclick="setFilter('active', this)">Actifs</button>
        <button class="filter-tab" onclick="setFilter('returned', this)">Retournés</button>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Livre</th>
            <th>Membre</th>
            <th>Date emprunt</th>
            <th>Durée</th>
            <th>Statut</th>
            <th style="text-align:right;">Actions</th>
          </tr>
        </thead>
        <tbody id="borrowings-tbody"></tbody>
      </table>
    </div>

  </div>
</div>

<!-- ════════ MODAL NOUVEL EMPRUNT ════════ -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">
      <span>Nouvel emprunt</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="fg">
      <label>Livre</label>
      <select id="input-book">
        <option value="">-- Choisir un livre disponible --</option>
      </select>
    </div>
    <div class="fg">
      <label>Membre</label>
      <select id="input-member">
        <option value="">-- Choisir un membre --</option>
      </select>
    </div>
    <div class="fg">
      <label>Date d'emprunt</label>
      <input type="date" id="input-date">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveBorrowing()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- ════════ MODAL RETOUR ════════ -->
<div class="modal-overlay" id="modal-return" onclick="handleReturnOverlayClick(event)">
  <div class="modal" style="width:380px;">
    <div class="modal-title">
      <span>Confirmer le retour</span>
      <button class="modal-close" onclick="closeReturnModal()">✕</button>
    </div>
    <div class="return-summary" id="return-summary"></div>
    <p style="color:var(--dim);font-size:.82rem;margin-bottom:4px;">
      Le livre sera marqué comme disponible et l'emprunt clôturé.
    </p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeReturnModal()">Annuler</button>
      <button class="btn btn-primary" style="background:var(--green);border-color:var(--green);" onclick="confirmReturn()">
        ✅ Confirmer le retour
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://tpyjpobheliuqkkriuod.supabase.co'
  const SUPABASE_KEY = 'sb_publishable_wCTVTGyYstnDSLmJh-lFjA_ORruAhnm'
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

  let currentRole   = null
  let currentUserId = null
  let allBorrowings = []
  let currentFilter = 'all'
  let searchQuery   = ''
  let returningId   = null

  const AVATAR_COLORS = ['#c84b2f','#60a5fa','#34d399','#fbbf24','#a78bfa','#f87171']

  // Données mockées
  const BOOKS   = [
    { id:1, title:'Le Petit Prince',     author:'Antoine de Saint-Exupéry', status:'available' },
    { id:2, title:'Les Misérables',      author:'Victor Hugo',              status:'borrowed'  },
    { id:3, title:'L\'Étranger',         author:'Albert Camus',             status:'borrowed'  },
    { id:4, title:'La Peste',            author:'Albert Camus',             status:'available' },
    { id:5, title:'Notre-Dame de Paris', author:'Victor Hugo',              status:'available' },
    { id:6, title:'Germinal',            author:'Émile Zola',               status:'borrowed'  },
  ]
  const MEMBERS = [
    { id:1, name:'Sophie Martin',  role:'student', borrowed:3 },
    { id:2, name:'Thomas Bernard', role:'student', borrowed:2 },
    { id:3, name:'Claire Dubois',  role:'teacher', borrowed:1 },
    { id:4, name:'Marc Lefèvre',   role:'teacher', borrowed:4 },
  ]

  async function handleLogout() {
    await sb.auth.signOut()
    window.location.href = 'auth.html'
  }

  // ══════════════════════════════
  //  INIT
  // ══════════════════════════════
  async function init() {
    const { data: { session } } = await sb.auth.getSession()
    if (!session) { window.location.href = 'auth.html'; return }

    const user = session.user
    currentRole   = user.user_metadata?.role || 'student'
    currentUserId = user.id

    const fullName = (user.user_metadata?.full_name || user.email.split('@')[0]).trim()
    const initials = fullName.split(' ').filter(Boolean).map(n => n[0]).join('').toUpperCase().slice(0,2)

    document.getElementById('user-name').textContent   = fullName
    document.getElementById('user-email').textContent  = user.email
    document.getElementById('user-avatar').textContent = initials
    document.getElementById('today-date').textContent  =
      new Date().toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' })

    buildSidebar(currentRole, fullName)
    loadBorrowings()

    if (currentRole === 'admin') {
      document.getElementById('btn-new').style.display = 'flex'
      document.getElementById('page-title').textContent = 'Gestion des emprunts'
    } else {
      document.getElementById('page-title').textContent = 'Mes emprunts'
    }

    document.body.style.visibility = 'visible'
  }

  // ══════════════════════════════
  //  SIDEBAR
  // ══════════════════════════════
  function buildSidebar(role, fullName) {
    const badge = document.getElementById('role-badge')
    const nav   = document.getElementById('sidebar-nav')
    const dash  = role === 'admin' ? 'dashboard-admin.html'
                : role === 'teacher' ? 'dashboard-teacher.html' : 'dashboard-student.html'

    if (role === 'admin') {
      badge.className = 'sb-role-badge role-admin'
      badge.textContent = '⚙️ Administrateur'
      nav.innerHTML = `
        <div class="sb-section">Principal</div>
        <a href="${dash}" class="sb-link"><span class="si">🏠</span> Tableau de bord</a>
        <a href="books.html" class="sb-link"><span class="si">📖</span> Livres</a>
        <a href="members.html" class="sb-link"><span class="si">👥</span> Membres</a>
        <a href="borrowings.html" class="sb-link active"><span class="si">🔄</span> Emprunts</a>
        <div class="sb-section">Catalogue</div>
        <a href="authors.html" class="sb-link"><span class="si">✍️</span> Auteurs</a>`
    } else if (role === 'teacher') {
      badge.className = 'sb-role-badge role-teacher'
      badge.textContent = '🏫 Enseignant'
      document.getElementById('user-avatar').style.background = 'var(--green)'
      nav.innerHTML = `
        <div class="sb-section">Mon espace</div>
        <a href="${dash}" class="sb-link"><span class="si">🏠</span> Tableau de bord</a>
        <a href="borrowings.html" class="sb-link active"><span class="si">🔄</span> Mes emprunts</a>
        <a href="books.html" class="sb-link"><span class="si">📖</span> Parcourir les livres</a>`
    } else {
      badge.className = 'sb-role-badge role-student'
      badge.textContent = '🎓 Étudiant'
      document.getElementById('user-avatar').style.background = 'var(--blue)'
      nav.innerHTML = `
        <div class="sb-section">Mon espace</div>
        <a href="${dash}" class="sb-link"><span class="si">🏠</span> Tableau de bord</a>
        <a href="borrowings.html" class="sb-link active"><span class="si">🔄</span> Mes emprunts</a>
        <a href="books.html" class="sb-link"><span class="si">📖</span> Parcourir les livres</a>`
    }
  }

  // ══════════════════════════════
  //  CHARGER EMPRUNTS
  // ══════════════════════════════
  function loadBorrowings() {
    const today = new Date()
    allBorrowings = [
      { id:1, bookId:2, bookTitle:'Les Misérables',      bookAuthor:'Victor Hugo',        memberId:1, memberName:'Sophie Martin',  memberRole:'student', borrowDate:'2026-02-10', status:'active'   },
      { id:2, bookId:3, bookTitle:"L'Étranger",           bookAuthor:'Albert Camus',       memberId:2, memberName:'Thomas Bernard', memberRole:'student', borrowDate:'2026-02-15', status:'active'   },
      { id:3, bookId:6, bookTitle:'Germinal',             bookAuthor:'Émile Zola',         memberId:3, memberName:'Claire Dubois',  memberRole:'teacher', borrowDate:'2026-02-20', status:'active'   },
      { id:4, bookId:1, bookTitle:'Le Petit Prince',      bookAuthor:'Saint-Exupéry',      memberId:4, memberName:'Marc Lefèvre',   memberRole:'teacher', borrowDate:'2026-01-15', returnDate:'2026-02-10', status:'returned' },
      { id:5, bookId:5, bookTitle:'Notre-Dame de Paris',  bookAuthor:'Victor Hugo',        memberId:1, memberName:'Sophie Martin',  memberRole:'student', borrowDate:'2026-01-20', returnDate:'2026-02-05', status:'returned' },
      { id:6, bookId:4, bookTitle:'La Peste',             bookAuthor:'Albert Camus',       memberId:2, memberName:'Thomas Bernard', memberRole:'student', borrowDate:'2026-03-01', status:'active'   },
    ]
    updateStats()
    renderBorrowings()
  }

  // ══════════════════════════════
  //  STATS
  // ══════════════════════════════
  function updateStats() {
    const active   = allBorrowings.filter(b => b.status === 'active')
    const returned = allBorrowings.filter(b => b.status === 'returned')
    const myActive = currentRole !== 'admin'
      ? active.filter(b => b.memberName === document.getElementById('user-name').textContent)
      : active

    let statsHTML = ''
    if (currentRole === 'admin') {
      statsHTML = `
        <div class="stat-card sc-amber">
          <div class="sc-top"><span class="sc-label">Actifs</span><span class="sc-icon">🔄</span></div>
          <div class="sc-val">${active.length}</div><div class="sc-sub">en circulation</div>
        </div>
        <div class="stat-card sc-green">
          <div class="sc-top"><span class="sc-label">Retournés</span><span class="sc-icon">✅</span></div>
          <div class="sc-val">${returned.length}</div><div class="sc-sub">ce mois</div>
        </div>
        <div class="stat-card sc-blue">
          <div class="sc-top"><span class="sc-label">Total</span><span class="sc-icon">📊</span></div>
          <div class="sc-val">${allBorrowings.length}</div><div class="sc-sub">tous les emprunts</div>
        </div>
        <div class="stat-card sc-accent">
          <div class="sc-top"><span class="sc-label">Membres actifs</span><span class="sc-icon">👥</span></div>
          <div class="sc-val">${[...new Set(active.map(b => b.memberId))].length}</div><div class="sc-sub">ont emprunté</div>
        </div>`
    } else {
      const max    = currentRole === 'teacher' ? 10 : 3
      const myBorr = active.length
      statsHTML = `
        <div class="stat-card sc-blue">
          <div class="sc-top"><span class="sc-label">Mes emprunts</span><span class="sc-icon">📖</span></div>
          <div class="sc-val">${myBorr}</div><div class="sc-sub">en cours</div>
        </div>
        <div class="stat-card sc-accent">
          <div class="sc-top"><span class="sc-label">Limite restante</span><span class="sc-icon">⚡</span></div>
          <div class="sc-val">${max - myBorr}</div><div class="sc-sub">emprunts possibles</div>
        </div>
        <div class="stat-card sc-green">
          <div class="sc-top"><span class="sc-label">Retournés</span><span class="sc-icon">✅</span></div>
          <div class="sc-val">${returned.length}</div><div class="sc-sub">au total</div>
        </div>
        <div class="stat-card sc-amber">
          <div class="sc-top"><span class="sc-label">Limite max</span><span class="sc-icon">🔒</span></div>
          <div class="sc-val">${max}</div><div class="sc-sub">livres autorisés</div>
        </div>`
    }
    document.getElementById('borrow-stats').innerHTML = statsHTML
  }

  // ══════════════════════════════
  //  RENDER TABLE
  // ══════════════════════════════
  function renderBorrowings() {
    const tbody = document.getElementById('borrowings-tbody')
    let filtered = allBorrowings

    if (currentFilter === 'active')   filtered = filtered.filter(b => b.status === 'active')
    if (currentFilter === 'returned') filtered = filtered.filter(b => b.status === 'returned')

    if (searchQuery.trim()) {
      const q = searchQuery.toLowerCase()
      filtered = filtered.filter(b =>
        b.bookTitle.toLowerCase().includes(q) ||
        b.memberName.toLowerCase().includes(q)
      )
    }

    if (filtered.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="ei">🔄</div><p>Aucun emprunt trouvé</p></div></td></tr>`
      return
    }

    const today = new Date()

    tbody.innerHTML = filtered.map(b => {
      const borrowDate = new Date(b.borrowDate)
      const diffDays   = Math.floor((today - borrowDate) / (1000*60*60*24))
      const daysClass  = diffDays > 30 ? 'days-late' : diffDays > 14 ? 'days-warn' : 'days-ok'
      const daysLabel  = b.status === 'returned'
        ? `<span style="color:var(--dim)">—</span>`
        : `<span class="${daysClass}">${diffDays}j</span>`

      const initials = b.memberName.split(' ').map(n => n[0]).join('').toUpperCase()
      const avatarColor = AVATAR_COLORS[b.memberId % AVATAR_COLORS.length]
      const memberRoleBadge = b.memberRole === 'student'
        ? `<span style="font-size:.65rem;color:var(--blue);">🎓 Étudiant</span>`
        : `<span style="font-size:.65rem;color:var(--green);">🏫 Enseignant</span>`

      const actions = b.status === 'active'
        ? `<button class="btn btn-primary btn-sm" style="background:var(--green);" onclick="openReturnModal(${b.id})">
             ✅ Retourner
           </button>`
        : `<span style="font-size:.75rem;color:var(--dim);">Retourné le ${formatDate(b.returnDate)}</span>`

      return `
        <tr>
          <td>
            <div class="book-cell">
              <h4>${b.bookTitle}</h4>
              <p>${b.bookAuthor}</p>
            </div>
          </td>
          <td>
            <div class="member-cell">
              <div class="member-dot" style="background:${avatarColor}">${initials}</div>
              <div>
                <div class="member-cell-name">${b.memberName}</div>
                <div class="member-cell-role">${memberRoleBadge}</div>
              </div>
            </div>
          </td>
          <td class="date-cell">${formatDate(b.borrowDate)}</td>
          <td class="days-cell">${daysLabel}</td>
          <td>
            <span class="badge ${b.status === 'active' ? 'b-amber' : 'b-green'}">
              ${b.status === 'active' ? 'Actif' : 'Retourné'}
            </span>
          </td>
          <td><div class="td-actions">${actions}</div></td>
        </tr>`
    }).join('')
  }

  function formatDate(dateStr) {
    if (!dateStr) return '—'
    return new Date(dateStr).toLocaleDateString('fr-FR', { day:'numeric', month:'short', year:'numeric' })
  }

  // ══════════════════════════════
  //  FILTRE + RECHERCHE
  // ══════════════════════════════
  function setFilter(filter, btn) {
    currentFilter = filter
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'))
    btn.classList.add('active')
    renderBorrowings()
  }

  document.getElementById('search-input').addEventListener('input', e => {
    searchQuery = e.target.value
    renderBorrowings()
  })

  // ══════════════════════════════
  //  MODAL NOUVEL EMPRUNT
  // ══════════════════════════════
  function openModal() {
    // Peupler les selects
    const bookSel = document.getElementById('input-book')
    bookSel.innerHTML = '<option value="">-- Choisir un livre disponible --</option>' +
      BOOKS.filter(b => b.status === 'available').map(b =>
        `<option value="${b.id}">${b.title} — ${b.author}</option>`).join('')

    const memberSel = document.getElementById('input-member')
    memberSel.innerHTML = '<option value="">-- Choisir un membre --</option>' +
      MEMBERS.map(m => {
        const max = m.role === 'student' ? 3 : 10
        const disabled = m.borrowed >= max ? 'disabled' : ''
        return `<option value="${m.id}" ${disabled}>${m.name} (${m.borrowed}/${max})</option>`
      }).join('')

    document.getElementById('input-date').value = new Date().toISOString().split('T')[0]
    document.getElementById('modal-overlay').classList.add('open')
  }

  function closeModal() { document.getElementById('modal-overlay').classList.remove('open') }
  function handleOverlayClick(e) { if (e.target === document.getElementById('modal-overlay')) closeModal() }

  function saveBorrowing() {
    const bookId   = parseInt(document.getElementById('input-book').value)
    const memberId = parseInt(document.getElementById('input-member').value)
    const date     = document.getElementById('input-date').value

    if (!bookId || !memberId || !date) { toast('❌ Tous les champs sont requis.', 'err'); return }

    const book   = BOOKS.find(b => b.id === bookId)
    const member = MEMBERS.find(m => m.id === memberId)
    const newId  = Math.max(...allBorrowings.map(b => b.id), 0) + 1

    allBorrowings.push({
      id: newId, bookId, bookTitle: book.title, bookAuthor: book.author,
      memberId, memberName: member.name, memberRole: member.role,
      borrowDate: date, status: 'active'
    })

    book.status = 'borrowed'
    member.borrowed++

    closeModal()
    updateStats()
    renderBorrowings()
    toast(`📖 Emprunt de "${book.title}" enregistré !`, 'ok')
  }

  // ══════════════════════════════
  //  MODAL RETOUR
  // ══════════════════════════════
  function openReturnModal(id) {
    returningId = id
    const b = allBorrowings.find(b => b.id === id)
    const diffDays = Math.floor((new Date() - new Date(b.borrowDate)) / (1000*60*60*24))
    document.getElementById('return-summary').innerHTML = `
      <h4>📖 ${b.bookTitle}</h4>
      <p>Emprunté par <strong>${b.memberName}</strong> · il y a ${diffDays} jour${diffDays > 1 ? 's' : ''}</p>`
    document.getElementById('modal-return').classList.add('open')
  }

  function closeReturnModal() {
    document.getElementById('modal-return').classList.remove('open')
    returningId = null
  }

  function handleReturnOverlayClick(e) { if (e.target === document.getElementById('modal-return')) closeReturnModal() }

  function confirmReturn() {
    const b = allBorrowings.find(b => b.id === returningId)
    b.status     = 'returned'
    b.returnDate = new Date().toISOString().split('T')[0]

    const book   = BOOKS.find(bk => bk.id === b.bookId)
    const member = MEMBERS.find(m => m.id === b.memberId)
    if (book)   book.status = 'available'
    if (member) member.borrowed = Math.max(0, member.borrowed - 1)

    closeReturnModal()
    updateStats()
    renderBorrowings()
    toast(`✅ "${b.bookTitle}" retourné avec succès !`, 'ok')
  }

  // ══════════════════════════════
  //  TOAST
  // ══════════════════════════════
  function toast(msg, type = 'info') {
    const c = document.getElementById('toasts')
    const t = document.createElement('div')
    t.className = `toast ${type}`
    t.textContent = msg
    c.appendChild(t)
    setTimeout(() => {
      t.style.opacity = '0'; t.style.transform = 'translateX(20px)'; t.style.transition = '.3s'
      setTimeout(() => t.remove(), 300)
    }, 3500)
  }

  // ══════════════════════════════
  //  CURSOR
  // ══════════════════════════════
  const cursor = document.getElementById('cursor')
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px'
    cursor.style.top  = e.clientY + 'px'
  })
  document.addEventListener('mouseover', e => {
    if (e.target.matches('a, button, tr')) cursor.classList.add('big')
    else cursor.classList.remove('big')
  })

  init()
</script>
</body>
</html>
